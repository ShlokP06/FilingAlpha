name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv venv --python 3.11

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check .

      - name: Black (check)
        run: uv run black --check core api pipeline reporting scripts tests

      - name: Mypy (reporting)
        run: uv run mypy reporting

      - name: Pytest (offline)
        run: uv run pytest -m "not integration"

  migrations:
    # Provisions a real Postgres, applies every Alembic migration, then reverses
    # and re-applies them — proving the schema migrates and rolls back cleanly.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: filing_alpha
          POSTGRES_USER: filing
          POSTGRES_PASSWORD: filing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U filing -d filing_alpha"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://filing:filing@localhost:5432/filing_alpha
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv venv --python 3.11

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Apply migrations (upgrade head)
        run: uv run alembic upgrade head

      - name: Reverse migrations (downgrade base)
        run: uv run alembic downgrade base

      - name: Re-apply migrations (upgrade head)
        run: uv run alembic upgrade head

  docker-build:
    # Verifies the API image still builds (catches Dockerfile / dependency drift).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f api/Dockerfile -t filingalpha-api .
